name: Test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ish_crm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ish_crm
      EMAIL_SEND_MODE: dry_run
      LLM_PROVIDER: gemini
      NODE_ENV: test
      CRON_SECRET: ci-test-cron-secret
      TEST_USER_PASSWORD: Test-ISH-2026!

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run db:apply-sql

      - name: Seed test user
        run: npm run db:seed-test-user

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Golden eval regression
        run: npm run test:eval

      - name: API tests
        run: npm run test:api

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true
